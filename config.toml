baseURL = "https://merelinux.org"
languageCode = 'en-us'
title = "🌱 Mere Linux"

pluralizeListTitles = false

enableRobotsTXT = true

[[menu.main]]
  name = "Tour"
  url = "/tour/"
  weight = 10

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 9

[taxonomies]
   tag = "tags"

[module]
  [[module.imports]]
    path = 'github.com/adityatelange/hugo-PaperMod'

[params]
  ShowPostNavLinks = true
  [params.assets]
    disableHLJS = true
